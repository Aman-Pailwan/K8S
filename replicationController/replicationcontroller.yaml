apiVersion: v1
kind: ReplicationController
metadata:
  name: nginx-replication-controller
  labels:
    name: nginx-replication-controller
    type: frontend
spec:
  replicas: 3
  selector:
    type: frontend
  template:
    metadata:
      name: nginx-pod
      labels:
        name: nginx-pod
        type: frontend
    spec:
      containers:
        - name: nginx
          image: nginx